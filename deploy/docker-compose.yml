services:
  backend:
    image: ghcr.io/xbdxllxhi2/speechify/backend:latest
    container_name: listenify-backend
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TTS_PROVIDER=${TTS_PROVIDER:-groq}
      - DEBUG=false
    networks:
      - nginx-conf
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/xbdxllxhi2/speechify/frontend:latest
    container_name: listenify-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nginx-conf
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  nginx-conf:
    external: true
