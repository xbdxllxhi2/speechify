server {
    listen 80;
    server_name listenify.dev.ould-abdellahi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name listenify.dev.ould-abdellahi.com;

    # SSL certs managed by upstream proxy (adjust paths to match your setup)
    ssl_certificate     /etc/nginx/certs/listenify.dev.ould-abdellahi.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/listenify.dev.ould-abdellahi.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://listenify-frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
